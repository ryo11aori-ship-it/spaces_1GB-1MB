name: Pure Spaces Ultimate CI
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build_and_prove:
    runs-on: ubuntu-latest
    env:
      SOURCE_DATE_EPOCH: 0
      LC_ALL: C
      TZ: UTC
    steps:
    - uses: actions/checkout@v4

    - name: 0. Define Formal Threat Model & Semantic Limits
      run: |
        echo "=== FORMAL ASSUMPTION, THREAT MODEL & LIMITATIONS ==="
        echo "[Trusted Computing Base (TCB) - Minimized & Explicit]"
        echo "  - Hardware architecture (x86_64) and microcode."
        echo "  - Linux x86_64 syscall ABI (Interface level contract)."
        echo "  - ELF64 binary format specification (Loader contract)."
        echo "[Explicitly REMOVED from TCB]"
        echo "  - GNU C Library (glibc) implementation & Unix Userland."
        echo "  - Assembler (as) & Linker (ld)."
        echo "  - Single Semantic Origin: Semantic validation uses a dual-oracle model (C VM vs Pure Python VM)."
        echo "  - Execution Substrate Dependency: DDC spans across distinct OS boundaries (Ubuntu vs Alpine/musl)."
        echo "[Security Guarantees]"
        echo "  - Memory Protection (W^X): The compiler ensures strict RX (code) and RW (data) segregation via dynamic mmap allocation."

    - name: 1. Setup Tools
      run: sudo apt-get update && sudo apt-get install -y clang tcc strace binutils libc-bin python3 musl-tools python3-seccomp

    - name: 1.5. Auto-generate and Save compiler.spaces
      run: |
        echo "=== Regenerating compiler.spaces from DNA ==="
        mkdir -p src spaces/self tests bin
        python3 tools/gen_spaces_compiler_bf_bundler.py > src/compiler_spaces_reader.bf
        python3 tools/bf_to_spaces.py src/compiler_spaces_reader.bf > src/compiler.spaces
        cp src/compiler.spaces spaces/self/compiler.spaces
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add src/compiler_spaces_reader.bf src/compiler.spaces spaces/self/compiler.spaces
        if ! git diff --staged --quiet; then git commit -m "feat: Auto-regenerate compiler.spaces with W^X memory protection enforced" && git push; else echo "✅ No changes in compiler.spaces detected. Proceeding..."; fi

    - name: 2. The Big Bang (Quad-Crown DDC via glibc & musl)
      run: |
        sed -i 's/int main(int argc, char \*\*argv) {/int main(int argc, char \*\*argv) { setbuf(stdout, NULL);/' src/ref/vm.c
        echo "--- Compiling VM with GCC, Clang, TCC, and MUSL-GCC ---"
        gcc -frandom-seed=0 -Wl,--build-id=none src/ref/vm.c -o bin/ref_vm_gcc
        clang -frandom-seed=0 -Wl,--build-id=none src/ref/vm.c -o bin/ref_vm_clang
        tcc src/ref/vm.c -o bin/ref_vm_tcc
        docker run --rm -v $(pwd):/work alpine sh -c "apk add --no-cache gcc musl-dev && gcc -static -frandom-seed=0 -Wl,--build-id=none /work/src/ref/vm.c -o /work/bin/ref_vm_alpine && chown $(id -u):$(id -g) /work/bin/ref_vm_alpine"
        strip bin/ref_vm_gcc bin/ref_vm_clang bin/ref_vm_tcc bin/ref_vm_alpine || true
        echo "--- Generating seeds across diverse substrates ---"
        ./bin/ref_vm_gcc src/compiler.spaces < src/compiler.spaces > seed/fresh_compiler_gcc.elf
        ./bin/ref_vm_clang src/compiler.spaces < src/compiler.spaces > seed/fresh_compiler_clang.elf
        ./bin/ref_vm_tcc src/compiler.spaces < src/compiler.spaces > seed/fresh_compiler_tcc.elf
        ./bin/ref_vm_alpine src/compiler.spaces < src/compiler.spaces > seed/fresh_compiler_alpine.elf
        chmod +x seed/fresh_compiler_gcc.elf
        echo "--- DDC Verification (Cross-libc Boundary) ---"
        GCC_HASH=$(sha256sum seed/fresh_compiler_gcc.elf | awk '{print $1}')
        CLANG_HASH=$(sha256sum seed/fresh_compiler_clang.elf | awk '{print $1}')
        TCC_HASH=$(sha256sum seed/fresh_compiler_tcc.elf | awk '{print $1}')
        ALPINE_HASH=$(sha256sum seed/fresh_compiler_alpine.elf | awk '{print $1}')
        echo "GCC (glibc):   $GCC_HASH"
        echo "Clang (glibc): $CLANG_HASH"
        echo "TCC (glibc):   $TCC_HASH"
        echo "MUSL-GCC:      $ALPINE_HASH"
        if [ "$GCC_HASH" != "$CLANG_HASH" ] || [ "$GCC_HASH" != "$TCC_HASH" ] || [ "$GCC_HASH" != "$ALPINE_HASH" ]; then exit 1; fi
        echo "✅ QUAD-CROWN DDC PASSED"
        cp seed/fresh_compiler_gcc.elf seed/fresh_compiler.elf
        python3 tools/bf_to_spaces.py <(echo "+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++.") > tests/test_A.spaces
        python3 tools/bf_to_spaces.py <(echo "++++++[>+++++++++++<-]>.") > tests/loop_test.spaces
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        if [ -f seed/compiler.elf ]; then REPO_HASH=$(sha256sum seed/compiler.elf | awk '{print $1}'); if [ "$GCC_HASH" != "$REPO_HASH" ]; then cp seed/fresh_compiler.elf seed/compiler.elf; git add seed/compiler.elf tests/test_A.spaces tests/loop_test.spaces; git commit -m "chore: Update seed compiler for W^X enforcement"; git push; fi; else cp seed/fresh_compiler.elf seed/compiler.elf; git add seed/compiler.elf tests/test_A.spaces tests/loop_test.spaces; git commit -m "chore: Init exact seed verified by Quad-Crown DDC"; git push; fi

    - name: 3. Bootstrap & Basic Functional Tests
      run: |
        chmod +x seed/compiler.elf
        ./seed/compiler.elf < src/compiler.spaces > compiler.elf
        chmod +x compiler.elf
        echo "--- Basic Functional Tests ---"
        ./compiler.elf < tests/test_A.spaces > test_A.elf
        chmod +x test_A.elf
        ./test_A.elf > output_A.txt
        if ! grep -q "A" output_A.txt; then exit 1; fi
        ./compiler.elf < tests/loop_test.spaces > loop_test.elf
        chmod +x loop_test.elf
        ./loop_test.elf > output_loop.txt
        if ! grep -q "B" output_loop.txt; then exit 1; fi
        echo "✅ Functional tests (A and B) passed."

    - name: 4. Prove C - Semantic Stability (Fixed-Point Hash Verification)
      run: |
        ./compiler.elf < src/compiler.spaces > compiler2.elf
        chmod +x compiler2.elf
        ./compiler2.elf < src/compiler.spaces > compiler3.elf
        echo "=== SHA-256 Hash Matching (The Provenance Proof) ==="
        SEED_HASH=$(sha256sum seed/compiler.elf | awk '{print $1}')
        COMPILER1_HASH=$(sha256sum compiler.elf | awk '{print $1}')
        COMPILER2_HASH=$(sha256sum compiler2.elf | awk '{print $1}')
        COMPILER3_HASH=$(sha256sum compiler3.elf | awk '{print $1}')
        echo "Seed (C-origin):     $SEED_HASH"
        echo "Compiler (Pure):     $COMPILER1_HASH"
        echo "Compiler2 (Re-pure): $COMPILER2_HASH"
        echo "Compiler3:           $COMPILER3_HASH"
        if [ "$SEED_HASH" != "$COMPILER1_HASH" ]; then echo "❌ PROVENANCE MISMATCH" && exit 1; fi
        if [ "$COMPILER1_HASH" != "$COMPILER2_HASH" ] || [ "$COMPILER2_HASH" != "$COMPILER3_HASH" ]; then echo "❌ FIXED POINT MISMATCH" && exit 1; fi
        echo "🎉 PERFECT MATCH: Provenance Closed and Fixed Point Stable!"

    - name: 5. Prove Visual Independence (Hexdump, Objdump, Strings, LDD)
      run: |
        echo "=== Hexdump of compiler.elf ==="
        hexdump -C compiler.elf | head -n 25
        echo "=== Disassembly Around Entry Point ==="
        objdump -d compiler.elf | head -n 200 || true
        echo "=== Strings Search (Checking for external traces) ==="
        strings compiler.elf | grep -iE "brainfuck|vm|interpreter|op_map|c" || echo "✅ CLEAN: No external semantic strings found!"
        echo "=== LDD Check (No glibc dependence) ==="
        ldd loop_test.elf || echo "✅ EXPECTED: not a dynamic executable (No glibc)"
        echo "=== Basic Strace (No external files or execve) ==="
        strace -f -e trace=execve ./loop_test.elf > /dev/null 2> execve.log
        if ! grep "execve(" execve.log | grep -v "loop_test.elf" > /dev/null; then echo "✅ PASS: No external execution"; else exit 1; fi
        strace -e trace=file ./loop_test.elf > /dev/null 2> file.log
        if ! grep -qE "open|access|stat" file.log; then echo "✅ PASS: No file dependency"; else exit 1; fi

    - name: 6. Prove F - Dual-Oracle Semantic Verification & Advanced Fuzzing
      run: |
        cat << 'EOF' > tools/ref_py_vm.py
        import sys
        def run_bf(code):
            tape = [0] * 30000; ptr = 0; pc = 0; loop_map = {}; stack = []
            for i, c in enumerate(code):
                if c == '[': stack.append(i)
                elif c == ']': start = stack.pop(); loop_map[start] = i; loop_map[i] = start
            while pc < len(code):
                c = code[pc]
                if c == '>': ptr = (ptr + 1) % 30000
                elif c == '<': ptr = (ptr - 1) % 30000
                elif c == '+': tape[ptr] = (tape[ptr] + 1) & 255
                elif c == '-': tape[ptr] = (tape[ptr] - 1) & 255
                elif c == '.': sys.stdout.buffer.write(bytes([tape[ptr]]))
                elif c == '[' and tape[ptr] == 0: pc = loop_map[pc]
                elif c == ']' and tape[ptr] != 0: pc = loop_map[pc]
                pc += 1
        with open(sys.argv[1], 'r') as f: run_bf(f.read())
        EOF
        cat << 'EOF' > tools/gen_fuzz_bf.py
        import random
        for i in range(10):
            v1 = random.randint(0, 5); v2 = random.randint(0, 5)
            bf = f"{'+'*v1}[>{'+'*v2}[>+<-]<-]>>."
            with open(f"tests/fuzz_{i}.bf", "w") as f: f.write(bf)
        EOF
        python3 tools/gen_fuzz_bf.py
        for i in $(seq 0 9); do
          python3 tools/bf_to_spaces.py tests/fuzz_$i.bf > tests/fuzz_$i.spaces
          python3 tools/ref_py_vm.py tests/fuzz_$i.bf > out_ref_$i
          ./compiler.elf < tests/fuzz_$i.spaces > comp_$i.elf
          chmod +x comp_$i.elf
          ./comp_$i.elf > out_comp_$i
          diff out_ref_$i out_comp_$i || exit 1
        done

    - name: 7. Prove E - Formal ELF Generation & Static/Runtime W^X
      run: |
        echo "=== Process Trace of Compiler ==="
        strace -f -e trace=process ./compiler.elf < src/compiler.spaces > /dev/null 2> compiler_process.log
        if grep -E "^(fork|vfork|clone)\(" compiler_process.log; then exit 1; fi
        if grep "^execve(" compiler_process.log | grep -v "\./compiler\.elf"; then exit 1; fi
        echo "=== Static W^X Verification ==="
        if readelf -l compiler.elf 2>/dev/null | grep -E " RWE | RWE$"; then echo "❌ STATIC RWX DETECTED"; exit 1; fi
        if readelf -l compiler.elf 2>/dev/null | grep -q "Requesting program interpreter"; then exit 1; fi
        if readelf -S compiler.elf 2>/dev/null | grep -qE "\.dynamic|\.plt|\.got"; then exit 1; fi
        echo "=== Runtime W^X Verification ==="
        strace -f -e trace=mmap,mprotect ./compiler.elf < src/compiler.spaces > /dev/null 2> mmap_trace.log
        cat mmap_trace.log
        # 🚀 指摘の通り、明示的で順序に依存しない正規表現でW+Xの同時要求を厳格に弾く！
        if grep -qE "PROT_EXEC.*PROT_WRITE|PROT_WRITE.*PROT_EXEC" mmap_trace.log; then echo "❌ RUNTIME RWX DETECTED"; exit 1; fi
        echo "✅ VERIFIED: Strict W^X memory protection enforced both statically and at runtime."

    - name: 8. Prove B - Syscall Runtime Guarantee (Seccomp Sandbox)
      run: |
        cat << 'EOF' > tools/seccomp_wrapper.py
        import os, sys, seccomp
        filt = seccomp.SyscallFilter(defaction=seccomp.KILL)
        filt.add_rule(seccomp.ALLOW, "write")
        filt.add_rule(seccomp.ALLOW, "exit")
        filt.add_rule(seccomp.ALLOW, "exit_group")
        filt.add_rule(seccomp.ALLOW, "execve")
        filt.add_rule(seccomp.ALLOW, "mmap")
        filt.load()
        os.execl(sys.argv[1], sys.argv[1])
        EOF
        python3 tools/seccomp_wrapper.py ./loop_test.elf > output_sandbox.txt
        if ! grep -q "B" output_sandbox.txt; then exit 1; fi

    - name: 9. Formal Verification Summary
      run: |
        echo "=================================================="
        echo "         FORMAL VERIFICATION RESULTS              "
        echo "=================================================="
        echo "✔ DDC (Execution Substrate Diversity): PASS"
        echo "✔ Fixed Point (Semantic Stability): PASS"
        echo "✔ Semantic Equivalence (Dual-Oracle Fuzzing): PASS"
        echo "✔ Process Purity (No as/ld invocations): PASS"
        echo "✔ Syscall Minimality (Strict Seccomp Sandbox): PASS"
        echo "✔ Static W^X Enforcement (ELF p_flags): PASS"
        echo "✔ Runtime W^X Enforcement (mmap/mprotect): PASS"
        echo "=================================================="
        echo "CONCLUSION: The Spaces compiler achieves practical semantic independence, reproducible self-hosting closure, and strict W^X memory safety."

    - name: 10. Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pure-spaces-binaries
        path: |
          *.elf
          *.log
          *.txt
